services:
  recognition:
    build:
      context: .
      dockerfile: recognition/Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - RECOGNITION_USE_GPU=false
    volumes:
      - gcp-credentials:/app/credentials:ro
    restart: unless-stopped

  data-fetcher:
    build:
      context: .
      dockerfile: data_fetcher/Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - .env
    volumes:
      - gcp-credentials:/app/credentials:ro
    restart: unless-stopped

volumes:
  gcp-credentials:
